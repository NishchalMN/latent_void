project:
  name: latent_void_inpaint360gs_bag
  output_dir: /home/gnanesh/scratch.msml612pcs3/latent_void/runs/inpaint360gs_bag
  device: cuda
  seed: 1234

dataset:
  type: inpaint360gs
  root: /home/gnanesh/scratch.msml612pcs3/latent_void/data/inpaint360
  scene: bag
  images_glob: images/*.{JPG,jpg,jpeg,png}
  masks_glob: masks/*.{npy,png,jpg,jpeg}
  cameras_path: sparse/0

prompts:
  object: bag
  shadow: ""
  include_shadow: false

checkpoints:
  diffsplat_root: /home/gnanesh/scratch.msml612pcs3/latent_void/external/DiffSplat
  gsrecon_weights: /home/gnanesh/scratch.msml612pcs3/latent_void/checkpoints/diffsplat/gsrecon_gobj265k_cnp_even4
  gsvae_weights: /home/gnanesh/scratch.msml612pcs3/latent_void/checkpoints/diffsplat/gsvae_gobj265k_sdxl_fp16
  sam3_root: /home/gnanesh/scratch.msml612pcs3/latent_void/external/sam3
  sam3_weights: /home/gnanesh/scratch.msml612pcs3/latent_void/checkpoints/sam3/sam3.pt
  latent_inpaint_weights: ""

geometry:
  input_res: 256
  device: cuda
  depth_model: /home/gnanesh/scratch.msml612pcs3/latent_void/checkpoints/marigold/depth-v1-1
  normal_model: /home/gnanesh/scratch.msml612pcs3/latent_void/checkpoints/marigold/normals-v1-1
  num_inference_steps: 4
  ensemble_size: 1
  depth_scale: 5.0
  normalize_cameras: true
  camera_norm_radius: 1.4
  coord_mode: scene_minmax

pipeline:
  max_views: 16
  mask_threshold: 0.55
  latent_downsample: 8
  gaussian_npz: ""
  latent_npy: ""
  mask_source: auto
  allow_fallback_inpaint: true

external:
  geometry_command: >-
    python tools/preprocess_geometry.py
    --config {config_path}
    --output-dir {geometry_dir}
  gsrecon_command: >-
    python tools/run_gsrecon_export.py
    --diffsplat-root {diffsplat_root}
    --weights {gsrecon_weights}
    --gsvae-weights {gsvae_weights}
    --dataset-root {dataset_root}
    --scene {scene_id}
    --geometry-manifest {geometry_manifest}
    --output-dir {gsrecon_dir}
  sam3_command: >-
    python tools/run_sam3_multiview.py
    --sam3-root {sam3_root}
    --checkpoint-path {sam3_weights}
    --manifest {manifest_path}
    --prompt "{prompt}"
    --output-dir {mask_dir}
    --resize-to {mask_resize}
  latent_inpaint_command: ""
  render_command: >-
    python tools/render_latent_scene.py
    --diffsplat-root {diffsplat_root}
    --gsvae-weights {gsvae_weights}
    --gaussian-npz {gaussian_npz}
    --latent-path {latent_path}
    --compare-latent-path {inpainted_latent_path}
    --output-dir {render_dir}

hpc:
  account: msml612pcs3-class
  partition: gpu-h100
  gres: gpu:h100:1
  time: "02:00:00"
  cpus_per_task: 8
  mem: 64G
