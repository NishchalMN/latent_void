project:
  name: latent_void_inpaint360gs
  output_dir: ${LATENT_VOID_OUTPUT_DIR:-runs/inpaint360gs_demo}
  device: cuda
  seed: 1234

dataset:
  type: inpaint360gs
  root: ${INPAINT360GS_ROOT:-/path/to/Inpaint360GS}
  scene: ${INPAINT360GS_SCENE:-garden}
  images_glob: images/*.{png,jpg,jpeg}
  masks_glob: masks/*.{npy,png,jpg,jpeg}
  cameras_path: cameras.json

prompts:
  object: ${LATENT_VOID_OBJECT_PROMPT:-chair}
  shadow: ${LATENT_VOID_SHADOW_PROMPT:-}
  include_shadow: false

checkpoints:
  diffsplat_root: ${DIFFSPLAT_ROOT:-/path/to/DiffSplat}
  gsrecon_weights: ${GSRECON_WEIGHTS:-/path/to/gsrecon.ckpt}
  gsvae_weights: ${GSVAE_WEIGHTS:-/path/to/gsvae.ckpt}
  sdxl_vae_path: ${SDXL_VAE_PATH:-/path/to/sdxl-vae-fp16-fix}
  tiny_vae_path: ${TINY_VAE_PATH:-/path/to/taesdxl}
  sam3_root: ${SAM3_ROOT:-/path/to/sam3}
  sam3_weights: ${SAM3_WEIGHTS:-/path/to/sam3.pt}
  latent_inpaint_weights: ${LATENT_INPAINT_WEIGHTS:-}

geometry:
  input_res: 256
  device: cuda
  preprocessing_profile: diffsplat_gobjaverse
  white_background: true
  depth_model: ${MARIGOLD_DEPTH_MODEL:-prs-eth/marigold-depth-v1-1}
  normal_model: ${MARIGOLD_NORMAL_MODEL:-prs-eth/marigold-normals-v1-1}
  num_inference_steps: 4
  ensemble_size: 1
  depth_scale: 5.0
  normalize_cameras: true
  camera_norm_radius: 1.4
  camera_reference_index: 0
  coord_mode: diffsplat

pipeline:
  max_views: 16
  mask_threshold: 0.55
  mask_score_threshold: 0.0
  mask_min_area: 0
  mask_max_area_fraction: 1.0
  mask_erode_pixels: 0
  mask_dilate_pixels: 0
  latent_downsample: 8
  latent_inpaint_iterations: 128
  gaussian_npz: ${GAUSSIAN_NPZ:-}
  latent_npy: ${LATENT_NPY:-}
  mask_source: auto
  allow_fallback_inpaint: false

external:
  geometry_command: ""
  gsrecon_command: >-
    python {diffsplat_root}/tools/run_gsrecon.py
    --weights {gsrecon_weights}
    --gsvae-weights {gsvae_weights}
    --sdxl-vae-path {sdxl_vae_path}
    --tiny-vae-path {tiny_vae_path}
    --dataset-root {dataset_root}
    --scene {scene_id}
    --output-dir {gsrecon_dir}
  sam3_command: >-
    python {sam3_root}/tools/run_sam3_multiview.py
    --weights {sam3_weights}
    --manifest {manifest_path}
    --prompt "{prompt}"
    --output-dir {mask_dir}
    --resize-to {mask_resize}
  # Harmonic context fill (CPU-friendly, no checkpoint):
  latent_inpaint_command: >-
    python tools/inpaint_latent_context.py
    --latent-path {latent_path}
    --mask-path {mask_path}
    --output-path {output_path}
    --iterations {latent_inpaint_iterations}
  # Learned void fill (requires checkpoints.latent_inpaint_weights; GPU):
  # latent_inpaint_command: >-
  #   python tools/inpaint_latent_masked_denoiser.py
  #   --weights {latent_inpaint_weights}
  #   --latent-path {latent_path}
  #   --mask-path {mask_path}
  #   --output-path {output_path}
  #   --refine-steps {latent_inpaint_iterations}
  render_command: >-
    python tools/render_latent_scene.py
    --diffsplat-root {diffsplat_root}
    --gsvae-weights {gsvae_weights}
    --sdxl-vae-path {sdxl_vae_path}
    --tiny-vae-path {tiny_vae_path}
    --gaussian-npz {gaussian_npz}
    --latent-path {latent_path}
    --compare-latent-path {inpainted_latent_path}
    --output-dir {render_dir}

hpc:
  account: msml612pcs3-class
  partition: gpu-h100
  gres: gpu:h100:1
  time: "02:00:00"
  cpus_per_task: 8
  mem: 64G
